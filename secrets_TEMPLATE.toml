# Template de credenciais para Streamlit Cloud
# Preencha com os dados da SUA Service Account do Google Cloud
# Cole este conteudo em Settings > Secrets no Streamlit Cloud

[gcp_service_account]
type = "service_account"
project_id = "SEU_PROJETO_AQUI"
private_key_id = "SUA_CHAVE_AQUI"
private_key = """-----BEGIN PRIVATE KEY-----
SUA_CHAVE_PRIVADA_AQUI
-----END PRIVATE KEY-----
"""
client_email = "sua-conta@seu-projeto.iam.gserviceaccount.com"
client_id = "000000000000000000000"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/sua-conta%40seu-projeto.iam.gserviceaccount.com"
universe_domain = "googleapis.com"
